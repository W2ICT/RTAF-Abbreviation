<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ค้นหาคำย่อ ทอ.</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #18181f;
    --surface2: #22222c;
    --border: #2e2e3a;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --text: #e8e8f0;
    --text2: #9090a8;
    --text3: #5a5a72;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, #13131a 0%, #1a1a28 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px 18px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner { max-width: 800px; margin: 0 auto; }
  .header-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-title::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
  }
  .mode-toggle {
    display: flex;
    background: var(--surface2);
    border-radius: 10px;
    padding: 4px;
    gap: 4px;
    margin-bottom: 14px;
    width: fit-content;
  }
  .mode-btn {
    padding: 7px 16px;
    border-radius: 7px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
    color: var(--text2);
    background: transparent;
  }
  .mode-btn.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 12px rgba(124,106,247,0.4);
  }
  .search-wrap { position: relative; }
  .search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 13px 44px 13px 44px;
    color: var(--text);
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    font-family: inherit;
  }
  .search-input::placeholder { color: var(--text3); }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,106,247,0.15);
  }
  .search-icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 18px;
    pointer-events: none;
  }
  .clear-btn {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    background: var(--border);
    border: none;
    color: var(--text2);
    cursor: pointer;
    width: 24px; height: 24px;
    border-radius: 50%;
    font-size: 14px;
    display: none;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .clear-btn:hover { background: var(--text3); }
  .clear-btn.show { display: flex; }
  .main { max-width: 800px; margin: 0 auto; padding: 20px 16px 40px; }
  .result-box {
    background: linear-gradient(135deg, var(--surface) 0%, #1c1c28 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 20px;
    min-height: 64px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    transition: border-color 0.3s;
  }
  .result-box.has-result { border-color: rgba(124,106,247,0.35); }
  .result-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    white-space: nowrap;
    padding-top: 3px;
  }
  .result-text { font-size: 17px; font-weight: 500; color: var(--text); line-height: 1.6; flex: 1; }
  .separator { color: var(--text3); margin: 0 6px; }
  .not-found { color: var(--text3); font-style: italic; font-size: 14px; font-weight: 400; }
  .result-placeholder { color: var(--text3); font-size: 14px; font-style: italic; font-weight: 400; }
  .suggestions {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 20px;
    overflow: hidden;
    display: none;
  }
  .suggestions.show { display: block; }
  .sug-header {
    padding: 10px 16px 8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    border-bottom: 1px solid var(--border);
  }
  .sug-item {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 1px solid rgba(46,46,58,0.5);
    transition: background 0.15s;
    gap: 12px;
  }
  .sug-item:last-child { border-bottom: none; }
  .sug-item:hover, .sug-item.focused { background: var(--surface2); }
  .sug-abbr { font-size: 14px; font-weight: 700; color: var(--accent2); min-width: 110px; }
  .sug-full { font-size: 14px; color: var(--text); flex: 1; }
  .sug-cat { font-size: 11px; color: var(--text3); white-space: nowrap; }
  .sug-highlight { color: var(--accent2); font-weight: 700; }
  .sug-fuzzy { opacity: 0.85; }
  .fuzzy-badge {
    display: inline-block;
    margin-left: 8px;
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    background: rgba(124,106,247,0.15);
    color: var(--accent2);
    vertical-align: middle;
  }
  .stats-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; padding: 0 2px; }
  .stats-count { font-size: 12px; color: var(--text3); }
  .stats-count span { color: var(--accent2); font-weight: 600; }
  .results-section { display: none; }
  .results-section.show { display: block; }
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; padding: 0 2px; }
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .result-card:hover { border-color: rgba(124,106,247,0.4); background: var(--surface2); }
  .card-abbr { font-size: 15px; font-weight: 700; color: var(--accent2); min-width: 110px; }
  .card-full { font-size: 14px; color: var(--text); flex: 1; line-height: 1.4; }
  .card-cat { font-size: 11px; color: var(--text3); text-align: right; max-width: 140px; line-height: 1.4; }
  .empty-state { text-align: center; padding: 48px 24px; color: var(--text3); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-title { font-size: 15px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
  .empty-sub { font-size: 13px; }
  .welcome { text-align: center; padding: 48px 24px 32px; color: var(--text3); }
  .welcome-icon { font-size: 48px; margin-bottom: 16px; }
  .welcome-title { font-size: 16px; font-weight: 500; color: var(--text2); margin-bottom: 8px; }
  .welcome-sub { font-size: 13px; line-height: 1.7; }
  .welcome-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 20px; }
  .chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent2); background: rgba(124,106,247,0.1); }
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 13px;
    color: var(--text);
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  @media (max-width: 600px) {
    .header { padding: 14px 14px 12px; }
    .card-cat { display: none; }
    .sug-cat { display: none; }
    .result-text { font-size: 15px; }
    .sug-abbr { min-width: 80px; }
    .card-abbr { min-width: 80px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-title">ระบบค้นหาคำย่อ ทอ.</div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="modeAbbr" onclick="setMode('abbr')">คำย่อ → คำเต็ม</button>
      <button class="mode-btn" id="modeFull" onclick="setMode('full')">คำเต็ม → คำย่อ</button>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput"
        placeholder="พิมพ์คำย่อ เช่น บก.ทอ.กพ."
        autocomplete="off" autocorrect="off" spellcheck="false"
        oninput="onInput()" onkeydown="onKeyDown(event)">
      <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="result-box" id="resultBox">
    <div class="result-label">แปล</div>
    <div class="result-text result-placeholder" id="resultText">—</div>
  </div>

  <div class="suggestions" id="suggestions">
    <div class="sug-header">คำแนะนำ</div>
    <div id="sugList"></div>
  </div>

  <div id="welcomeState" class="welcome">
    <div class="welcome-icon">✈️</div>
    <div class="welcome-title">ค้นหาคำย่อหน่วยงาน ทอ.</div>
    <div class="welcome-sub">พิมพ์คำย่อต่อกันได้เลย เช่น <strong style="color:var(--accent2)">บก.ทอ.</strong><br>ระบบจะแปลความหมายให้อัตโนมัติ</div>
    <div class="welcome-chips" id="exampleChips"></div>
  </div>

  <div class="results-section" id="resultsSection">
    <div class="stats-bar">
      <div class="stats-count">พบ <span id="countText">0</span> รายการ</div>
    </div>
    <div class="section-label">ผลลัพธ์</div>
    <div id="resultsList"></div>
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="empty-icon">🔎</div>
      <div class="empty-title">ไม่พบคำที่ค้นหา</div>
      <div class="empty-sub">ลองพิมพ์คำย่อหรือคำเต็มอื่น</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

const abbrMap = {};
const fullMap = {};
const fullIndex = [];
DATA.forEach(function(d) {
  var key = d.abbr.toLowerCase();
  if (!abbrMap[key]) abbrMap[key] = [];
  abbrMap[key].push(d);
  var fkey = d.full.toLowerCase();
  if (!fullMap[fkey]) fullMap[fkey] = d;
  fullIndex.push(d);
});

function lookupFull(phrase) {
  var key = phrase.toLowerCase().trim();
  return fullMap[key] || null;
}

function parseFullTokens(query) {
  var words = query.trim().split(/\s+/).filter(function(w) { return w; });
  if (words.length === 0) return [];
  var result = [];
  var i = 0;
  while (i < words.length) {
    var matched = false;
    for (var len = words.length - i; len >= 1; len--) {
      var candidate = words.slice(i, i + len).join(' ');
      if (lookupFull(candidate)) {
        result.push(lookupFull(candidate));
        i += len;
        matched = true;
        break;
      }
    }
    if (!matched) {
      result.push({ abbr: null, full: words.slice(i).join(' ') });
      i = words.length;
    }
  }
  return result;
}

function parseTokens(query) {
  // Split into segments by dot, filter empty trailing
  var raw = query.split('.');
  var segs = [];
  for (var i = 0; i < raw.length; i++) {
    var s = raw[i].trim();
    if (s) segs.push(s);
  }
  if (segs.length === 0) return [query];

  // Greedy longest-match: try to consume as many segments as possible per token
  var result = [];
  var i = 0;
  while (i < segs.length) {
    var matched = false;
    for (var len = segs.length - i; len >= 1; len--) {
      var candidate = segs.slice(i, i + len).join('.') + '.';
      if (lookupAbbr(candidate)) {
        result.push(candidate);
        i += len;
        matched = true;
        break;
      }
    }
    if (!matched) {
      // No match — could be partial input (last token still being typed)
      var partial = segs.slice(i).join('.');
      // Check if query ends with dot (completed token) or not (partial)
      var endsWithDot = query.trim().slice(-1) === '.';
      result.push(partial + (endsWithDot ? '.' : ''));
      i = segs.length;
    }
  }
  return result;
}

function lookupAbbr(token) {
  var key = token.toLowerCase();
  if (abbrMap[key]) return abbrMap[key][0];
  var keyNoDot = key.replace(/\.$/, '');
  var keyWithDot = keyNoDot + '.';
  if (abbrMap[keyWithDot]) return abbrMap[keyWithDot][0];
  if (abbrMap[keyNoDot]) return abbrMap[keyNoDot][0];
  return null;
}

function onInput() {
  var input = document.getElementById('searchInput');
  var q = input.value.trim();
  currentQuery = q;
  sugFocusIdx = -1;
  document.getElementById('clearBtn').classList.toggle('show', q.length > 0);
  if (!q) { clearSearch(); return; }
  if (mode === 'abbr') {
    updateResultBox(q);
    updateSuggestions(q);
  } else {
    updateResultBoxFull(q);
    updateSuggestionsFull(q);
  }
  document.getElementById('welcomeState').style.display = 'none';
  document.getElementById('resultsSection').classList.remove('show');
}

function updateResultBox(q) {
  var tokens = parseTokens(q);
  var box = document.getElementById('resultBox');
  var textEl = document.getElementById('resultText');
  var parts = [];
  var anyFound = false;
  for (var i = 0; i < tokens.length; i++) {
    var match = lookupAbbr(tokens[i]);
    if (match) {
      anyFound = true;
      parts.push('<span>' + escHtml(match.full) + '</span>');
    } else {
      parts.push('<span class="not-found">' + escHtml(tokens[i]) + '</span>');
    }
  }
  if (anyFound) {
    textEl.className = 'result-text';
    textEl.innerHTML = parts.join(' ');
    box.classList.add('has-result');
  } else {
    textEl.className = 'result-text result-placeholder';
    textEl.innerHTML = '—';
    box.classList.remove('has-result');
  }
}

function updateResultBoxFull(q) {
  var box = document.getElementById('resultBox');
  var textEl = document.getElementById('resultText');
  if (!q.trim()) { box.classList.remove('has-result'); textEl.className = 'result-text result-placeholder'; textEl.innerHTML = '—'; return; }
  var tokens = parseFullTokens(q);
  var parts = [];
  var anyFound = false;
  for (var i = 0; i < tokens.length; i++) {
    if (tokens[i].abbr) {
      anyFound = true;
      parts.push('<span style="color:var(--accent2);font-weight:700">' + escHtml(tokens[i].abbr) + '</span>');
    } else {
      parts.push('<span class="not-found">' + escHtml(tokens[i].full) + '</span>');
    }
  }
  if (anyFound) {
    textEl.className = 'result-text';
    textEl.innerHTML = parts.join('');
    box.classList.add('has-result');
  } else {
    textEl.className = 'result-text result-placeholder';
    textEl.innerHTML = '—';
    box.classList.remove('has-result');
  }
}

// --- Fuzzy helpers ---
function stripDots(s) { return s.replace(/\./g, '').toLowerCase(); }

// Subsequence: every char in needle appears in order in haystack
function isSubsequence(needle, haystack) {
  var ni = 0;
  for (var hi = 0; hi < haystack.length && ni < needle.length; hi++) {
    if (needle[ni] === haystack[hi]) ni++;
  }
  return ni === needle.length;
}

// Build highlighted subsequence HTML (marks matched chars)
function subseqHighlight(needle, text) {
  var result = '';
  var ni = 0;
  var needleLow = needle.toLowerCase();
  var textLow = text.toLowerCase();
  for (var hi = 0; hi < text.length; hi++) {
    if (ni < needle.length && textLow[hi] === needleLow[ni]) {
      result += '<span class="sug-highlight">' + escHtml(text[hi]) + '</span>';
      ni++;
    } else {
      result += escHtml(text[hi]);
    }
  }
  return result;
}

function getFuzzyAbbrMatches(rawQuery, exclude) {
  var q = stripDots(rawQuery);
  if (q.length < 2) return [];
  var seen = {};
  exclude.forEach(function(d) { seen[d.abbr] = true; });
  var nodot = [], subseq = [];
  fullIndex.forEach(function(d) {
    if (seen[d.abbr]) return;
    var t = stripDots(d.abbr);
    if (t.indexOf(q) !== -1) { nodot.push({d:d, type:'nodot'}); seen[d.abbr] = true; }
    else if (isSubsequence(q, t)) { subseq.push({d:d, type:'subseq'}); seen[d.abbr] = true; }
  });
  return nodot.concat(subseq).slice(0, 5);
}

function getFuzzyFullMatches(rawQuery, exclude) {
  var q = rawQuery.toLowerCase().replace(/\s+/g, '');
  if (q.length < 2) return [];
  var seen = {};
  exclude.forEach(function(d) { seen[d.abbr] = true; });
  var nodot = [], subseq = [];
  fullIndex.forEach(function(d) {
    if (seen[d.abbr]) return;
    var t = d.full.toLowerCase().replace(/\s+/g, '');
    if (t.indexOf(q) !== -1) { nodot.push({d:d, type:'nodot'}); seen[d.abbr] = true; }
    else if (isSubsequence(q, t)) { subseq.push({d:d, type:'subseq'}); seen[d.abbr] = true; }
  });
  return nodot.concat(subseq).slice(0, 5);
}
// --- End fuzzy helpers ---

function updateSuggestions(q) {
  var tokens = parseTokens(q);
  var lastToken = tokens[tokens.length - 1] || '';
  var lastLower = lastToken.toLowerCase();
  var exact = [];
  if (lastToken) {
    var startM = fullIndex.filter(function(d) { return d.abbr.toLowerCase().indexOf(lastLower) === 0; });
    var containM = fullIndex.filter(function(d) { return d.abbr.toLowerCase().indexOf(lastLower) !== 0 && d.abbr.toLowerCase().indexOf(lastLower) !== -1; });
    exact = startM.concat(containM).slice(0, 8);
  }
  var fuzzy = exact.length < 5 ? getFuzzyAbbrMatches(lastToken, exact) : [];
  var all = exact.map(function(d) { return {d:d, type:'exact'}; }).concat(fuzzy);
  currentSuggestions = all.map(function(x) { return x.d; });
  renderSuggestionsTyped(all, lastToken, 'abbr');
}

function updateSuggestionsFull(q) {
  var ql = q.toLowerCase();
  var startM = fullIndex.filter(function(d) { return d.full.toLowerCase().indexOf(ql) === 0; });
  var containM = fullIndex.filter(function(d) { return d.full.toLowerCase().indexOf(ql) !== 0 && d.full.toLowerCase().indexOf(ql) !== -1; });
  var exact = startM.concat(containM).slice(0, 8);
  var fuzzy = exact.length < 5 ? getFuzzyFullMatches(q, exact) : [];
  var all = exact.map(function(d) { return {d:d, type:'exact'}; }).concat(fuzzy);
  currentSuggestions = all.map(function(x) { return x.d; });
  renderSuggestionsTyped(all, q, 'full');
}

function renderSuggestionsTyped(items, highlight, searchMode) {
  var sug = document.getElementById('suggestions');
  var list = document.getElementById('sugList');
  if (items.length === 0) { sug.classList.remove('show'); return; }
  list.innerHTML = items.map(function(item, i) {
    var d = item.d;
    var isFuzzy = item.type !== 'exact';
    var abbrHtml, fullHtml;
    if (searchMode === 'abbr') {
      abbrHtml = isFuzzy ? subseqHighlight(stripDots(highlight), d.abbr) : highlightText(d.abbr, highlight);
      fullHtml = escHtml(d.full);
    } else {
      abbrHtml = escHtml(d.abbr);
      fullHtml = isFuzzy ? subseqHighlight(highlight.replace(/\s+/g,''), d.full) : highlightText(d.full, highlight);
    }
    var fuzzyBadge = isFuzzy ? '<span class="fuzzy-badge">~คาดเดา</span>' : '';
    return '<div class="sug-item' + (isFuzzy ? ' sug-fuzzy' : '') + '" data-idx="' + i + '" onclick="selectSuggestion(' + i + ')">' +
      '<span class="sug-abbr">' + abbrHtml + '</span>' +
      '<span class="sug-full">' + fullHtml + fuzzyBadge + '</span>' +
      '<span class="sug-cat">' + escHtml(d.cat) + '</span>' +
    '</div>';
  }).join('');
  sug.classList.add('show');
}

// keep old names as aliases for compatibility
function renderSuggestions(matches, highlight) {}
function renderSuggestionsFull(matches, highlight) {}

function selectSuggestion(idx) {
  var d = currentSuggestions[idx];
  if (!d) return;
  var input = document.getElementById('searchInput');
  if (mode === 'abbr') {
    var tokens = parseTokens(currentQuery);
    tokens[tokens.length - 1] = d.abbr;
    input.value = tokens.join('');
  } else {
    input.value = d.full;
  }
  document.getElementById('suggestions').classList.remove('show');
  onInput();
  showAllResults(input.value);
}

function showAllResults(q) {
  var ql = q.toLowerCase();
  var results;
  if (mode === 'abbr') {
    var startM = fullIndex.filter(function(d) { return d.abbr.toLowerCase().indexOf(ql) === 0; });
    var containM = fullIndex.filter(function(d) { return d.abbr.toLowerCase().indexOf(ql) !== 0 && d.abbr.toLowerCase().indexOf(ql) !== -1; });
    results = startM.concat(containM);
  } else {
    var startM2 = fullIndex.filter(function(d) { return d.full.toLowerCase().indexOf(ql) === 0; });
    var containM2 = fullIndex.filter(function(d) { return d.full.toLowerCase().indexOf(ql) !== 0 && d.full.toLowerCase().indexOf(ql) !== -1; });
    results = startM2.concat(containM2);
  }
  var section = document.getElementById('resultsSection');
  var list = document.getElementById('resultsList');
  var empty = document.getElementById('emptyState');
  document.getElementById('countText').textContent = results.length;
  section.classList.add('show');
  document.getElementById('suggestions').classList.remove('show');
  if (results.length === 0) {
    list.innerHTML = '';
    empty.style.display = '';
  } else {
    empty.style.display = 'none';
    list.innerHTML = results.slice(0, 100).map(function(d) {
      var abbrHl = mode === 'abbr' ? highlightText(d.abbr, q) : escHtml(d.abbr);
      var fullHl = mode === 'full' ? highlightText(d.full, q) : escHtml(d.full);
      return '<div class="result-card" onclick="copyText(\'' + escJs(d.abbr) + ' = ' + escJs(d.full) + '\')">' +
        '<span class="card-abbr">' + abbrHl + '</span>' +
        '<span class="card-full">' + fullHl + '</span>' +
        '<span class="card-cat">' + escHtml(d.cat) + '</span>' +
      '</div>';
    }).join('');
    if (results.length > 100) {
      list.innerHTML += '<div style="text-align:center;padding:16px;color:var(--text3);font-size:13px">แสดง 100 จากทั้งหมด ' + results.length + ' รายการ</div>';
    }
  }
}

function onKeyDown(e) {
  var items = document.querySelectorAll('.sug-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    sugFocusIdx = Math.min(sugFocusIdx + 1, items.length - 1);
    updateSugFocus(items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    sugFocusIdx = Math.max(sugFocusIdx - 1, -1);
    updateSugFocus(items);
  } else if (e.key === 'Enter') {
    if (sugFocusIdx >= 0 && items[sugFocusIdx]) {
      selectSuggestion(sugFocusIdx);
    } else {
      document.getElementById('suggestions').classList.remove('show');
      showAllResults(currentQuery);
    }
  } else if (e.key === 'Escape') {
    document.getElementById('suggestions').classList.remove('show');
  }
}

function updateSugFocus(items) {
  items.forEach(function(el, i) { el.classList.toggle('focused', i === sugFocusIdx); });
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(function() { showToast('คัดลอกแล้ว: ' + text); });
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escJs(s) {
  return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}
function highlightText(text, query) {
  if (!query) return escHtml(text);
  var escaped = escHtml(text);
  var qEsc = escHtml(query).replace(/[-[\]{}()*+?.,\\^$|#\s]/g, '\\$&');
  return escaped.replace(new RegExp('(' + qEsc + ')', 'gi'), '<span class="sug-highlight">$1</span>');
}

var examples = ['ทอ.','บก.','กพ.','สบ.','นบ.','บน.','รร.การบิน'];
var chips = document.getElementById('exampleChips');
examples.forEach(function(ex) {
  var c = document.createElement('div');
  c.className = 'chip';
  c.textContent = ex;
  c.onclick = function() {
    document.getElementById('searchInput').value = ex;
    onInput();
  };
  chips.appendChild(c);
});
</script>
</body>
